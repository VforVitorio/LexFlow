name: Epic
description: Agrupar un conjunto de tareas relacionadas bajo un objetivo común
title: "[Epic]: "
labels: ["epic"]
body:
  - type: markdown
    attributes:
      value: |
        Las epics agrupan issues relacionados bajo un objetivo común. Usa este template para planificar bloques grandes de trabajo.

  - type: textarea
    id: objective
    attributes:
      label: Objetivo
      description: ¿Qué se quiere conseguir con esta epic?
      placeholder: "Implementar el sistema de búsqueda semántica con embeddings..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexto y motivación
      description: ¿Por qué es importante? ¿Qué problema de alto nivel resuelve?
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tareas / Issues incluidos
      description: Lista de tareas o issues que forman parte de esta epic.
      placeholder: |
        - [ ] #12 — Parser de metadatos de leyes
        - [ ] #13 — Modelo Pydantic para Versión
        - [ ] #14 — Endpoint de diff
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: Criterio de completado
      description: ¿Cómo sabremos que esta epic está terminada?
      placeholder: "Todos los issues listados arriba están cerrados y los tests pasan."
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Fase del roadmap
      options:
        - "Fase 0 — Fundación"
        - "Fase 1 — API base"
        - "Fase 2 — Grafo"
        - "Fase 3 — Chat"
        - "Fase 4 — Dashboards"
        - "Fase 5 — Frontend"
        - "Fase 6 — Producto"
        - "Fase 7 — Búsqueda semántica"
    validations:
      required: true
