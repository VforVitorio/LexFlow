name: Feature Request
description: Proponer una nueva funcionalidad o mejora
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por proponer una mejora para LexFlow. Describe tu idea con el mayor detalle posible.

  - type: textarea
    id: problem
    attributes:
      label: Problema o necesidad
      description: ¿Qué problema resuelve esta feature? ¿Qué necesidad cubre?
      placeholder: "Actualmente no hay forma de filtrar leyes por fecha de publicación..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solución propuesta
      description: Describe cómo te imaginas la solución.
      placeholder: "Añadir un parámetro `date_from` y `date_to` al endpoint de búsqueda..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: ¿Has pensado en otras formas de resolver esto?

  - type: dropdown
    id: component
    attributes:
      label: Componente relacionado
      options:
        - API
        - Grafo
        - Chat
        - Dashboards
        - Frontend
        - Core / Parsers
        - Distribución / Packaging
        - Otro
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Fase del roadmap
      description: ¿En qué fase del ROADMAP.md encajaría esta feature?
      options:
        - "Fase 1 — API base"
        - "Fase 2 — Grafo"
        - "Fase 3 — Chat"
        - "Fase 4 — Dashboards"
        - "Fase 5 — Frontend"
        - "Fase 6 — Producto"
        - "Fase 7 — Búsqueda semántica"
        - "No estoy seguro"

  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Mockups, referencias, ejemplos de otros proyectos, etc.
