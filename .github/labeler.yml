# actions/labeler v6 configuration.
#
# Each top-level key is a label name (it must already exist in the repo;
# the workflow does not create labels, only applies them). The value is
# a list of conditions evaluated against the files changed in the PR.
#
# We use ``changed-files`` with ``any-glob-to-any-file`` so a single file
# matching any of the globs is enough to trigger the label — a PR that
# touches src/ AND tests/ gets BOTH ``area: codebase`` and ``area: tests``.

"area: codebase":
  - changed-files:
      - any-glob-to-any-file:
          - "src/**"
          - "scripts/**"
          - "main.py"

"area: api":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lexflow/api/**"

"area: graph":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lexflow/graph/**"

"area: chat":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lexflow/chat/**"

"area: dashboards":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lexflow/dashboards/**"

"area: frontend":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lexflow/**/pages/**"
          - "src/lexflow/**/components/**"
          - "assets/**"

"area: core":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lexflow/core/**"
          - "src/lexflow/utils/**"

"area: deps":
  - changed-files:
      - any-glob-to-any-file:
          - "pyproject.toml"
          - "uv.lock"

"area: ci-cd":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"
          - ".github/labeler.yml"

"area: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "**/*.md"
          - "README.md"
          - "CONTRIBUTING.md"
          - "ARCHITECTURE.md"
          - "INSTALL.md"
          - "ROADMAP.md"

"area: tests":
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"

"area: data":
  - changed-files:
      - any-glob-to-any-file:
          - ".gitmodules"
          - "data/**"
