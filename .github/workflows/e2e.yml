name: e2e

# Playwright golden-path suite (#91). Heavier than unit tests
# (downloads Chromium each run, ~250 MB), so triggered only on:
#   * PRs explicitly labelled `needs-e2e` — opt-in for risky frontend
#     PRs;
#   * push to `main` (post-merge verification);
#   * nightly cron — catches drift from cross-PR merges that
#     individually passed.
#
# The suite runs the production build through `vite preview` (mock
# mode) so it never depends on FastAPI being up.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled]
  push:
    branches: [main]
    paths:
      - "frontend/**"
  schedule:
    # 07:30 UTC = 09:30 Madrid — after the a11y nightly so artefacts
    # don't pile up at the same moment.
    - cron: "30 7 * * *"

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: playwright (chromium)
    # On a PR, only run when the `needs-e2e` label is present so we
    # don't burn 4 minutes per push on PRs that don't touch the
    # navigation surface. Push + schedule always run.
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'needs-e2e')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        # Cache key is the @playwright/test version; Chromium re-installs
        # only when the package bumps. Saves ~90 s per run.
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build

      - name: Run e2e suite
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 14
