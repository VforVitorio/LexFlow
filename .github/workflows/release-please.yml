name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          # The `${{ secrets.X || secrets.GITHUB_TOKEN }}` fallback used to
          # forward an empty (but masked) string to the API when the PAT
          # was not set, which the action surfaced as "Bad credentials".
          # `github.token` resolves to the workflow-scoped token whose
          # scopes are governed by the `permissions:` block above.
          token: ${{ github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-wheel:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest

      - name: Build wheel and sdist
        run: uv build

      - name: Upload artefacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} dist/*.whl dist/*.tar.gz --clobber
