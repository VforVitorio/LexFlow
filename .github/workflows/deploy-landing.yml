name: Deploy landing to GitHub Pages

# Publishes the standalone marketing landing under
# https://VforVitorio.github.io/LexFlow/ on every push to main that touches
# the landing/ directory. The landing is a completely separate Vite project
# from the SPA in frontend/ — different deps, different bundle, different
# deploy target. Uses GitHub's modern Pages artifact deploy (no gh-pages
# branch, no force-push orphan) so future Pages surfaces can stack into the
# same artifact later.
#
# One-time setup required in repo settings: Pages → Source = "GitHub Actions"
# (or `gh api -X POST repos/VforVitorio/LexFlow/pages -F build_type=workflow`).

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages allows only one in-flight deployment at a time. We do NOT cancel an
# in-progress run so a deploy that has already started is allowed to finish —
# the next push will queue cleanly behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build landing (with /LexFlow/ base)
        env:
          VITE_BASE_PATH: /LexFlow/
        run: npm run build

      # GitHub Pages serves 404.html for any path it cannot resolve to a
      # static file. The landing is a single page so the 404 is just the
      # same index.html (visitor lands on the marketing page either way).
      - name: 404 fallback (index.html → 404.html)
        run: cp dist/index.html dist/404.html

      # #162 — substitute Cloudflare Web Analytics beacon token. The HTML
      # ships with the placeholder __VITE_CF_BEACON_TOKEN__; this step
      # replaces it with the secret. We can't gate the step on the secret
      # being set (GitHub Actions doesn't expose `secrets.*` in step `if:`),
      # so the shell checks at run-time and is a graceful no-op when the
      # secret is unset.
      - name: Inject Cloudflare Analytics token
        env:
          CF_BEACON_TOKEN: ${{ secrets.CF_BEACON_TOKEN }}
        run: |
          if [ -n "$CF_BEACON_TOKEN" ]; then
            sed -i "s/__VITE_CF_BEACON_TOKEN__/${CF_BEACON_TOKEN}/g" dist/index.html dist/404.html
            echo "Cloudflare Web Analytics beacon token injected."
          else
            echo "CF_BEACON_TOKEN secret not set; leaving placeholder (Cloudflare will ignore it)."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
