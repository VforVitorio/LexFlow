name: Deploy landing to GitHub Pages

# Publishes the React landing under https://VforVitorio.github.io/LexFlow/ on
# every push to main that touches the frontend. Uses GitHub's modern Pages
# artifact deploy (no gh-pages branch, no force-push orphan) so future Pages
# surfaces (docs, demos) can stack into the same artifact later.
#
# One-time setup required in repo settings: Pages → Source = "GitHub Actions"
# (or `gh api -X POST repos/VforVitorio/LexFlow/pages -F build_type=workflow`).

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages allows only one in-flight deployment at a time. We do NOT cancel an
# in-progress run (cancel-in-progress: false) so a deploy that has already
# started is allowed to finish — the next push will queue cleanly behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (with /LexFlow/ base)
        env:
          VITE_BASE_PATH: /LexFlow/
        run: npm run build

      # GitHub Pages serves 404.html for any path it cannot resolve to a
      # static file. Duplicating index.html there lets BrowserRouter handle
      # deep links (e.g. /LexFlow/onboarding) on a hard refresh.
      - name: SPA fallback (index.html → 404.html)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
