name: OSV-Scanner

# Cross-ecosystem vulnerability scan against OSV.dev (Python via
# uv.lock + npm via the two package-lock.json files in one pass).
# Aggregates GHSA + PyPA + RustSec + OSS-Fuzz advisories — broader
# than pip-audit alone.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "landing/package.json"
      - "landing/package-lock.json"
      # Changes to the scanner config itself must re-trigger it on the PR,
      # otherwise a broken bump (like the @v1 → @v2 fix) only surfaces
      # post-merge on main.
      - ".github/workflows/osv-scanner.yml"
  schedule:
    - cron: "30 6 * * 1"  # Weekly, Monday 06:30 UTC (≈ 08:30 Europe/Madrid)

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    # Pinned to v2 — the old ``@v1`` reusable workflow no longer resolves, so
    # every run died at startup with 0 jobs (no scan ran). v2 keeps the same
    # ``scan-args`` contract; ``--skip-git`` is dropped because the v2 source
    # scan doesn't walk git history in this mode. Dependabot (github-actions
    # ecosystem) bumps the pin from here.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        ./
      upload-sarif: true
      fail-on-vuln: true
