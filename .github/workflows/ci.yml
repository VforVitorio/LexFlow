name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "docs/**"]
  pull_request:
    branches: [main]

# Cancel any in-flight CI for the same ref when a newer push lands. Keeps
# the queue from piling up when release-please pushes back-to-back PR
# refreshes (which previously stranded multiple runs in "queued").
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Notes on dependency strategy across the three jobs:
#   - All three jobs enable uv's built-in cache (`enable-cache: true`) and
#     key it off `uv.lock`. The cache only invalidates when the resolved
#     graph actually changes — cosmetic edits to pyproject.toml (re-ordering,
#     tool config, comments) reuse the wheel store.
#   - All sync calls use `--frozen` to skip resolution entirely and just
#     install the locked versions. Faster than letting uv re-resolve on
#     every run, and guarantees CI sees exactly what the developer
#     committed.
#   - setup-uv installs Python via the `python-version` input.
#   - `lint` does NOT call `uv sync`. Ruff is the only tool it needs, so
#     `uvx ruff` runs it as an ephemeral tool.
#   - `typecheck` and `test` install an EXPLICIT extra list
#     (`--extra chat --extra dashboards --extra dev`), NOT `--all-extras`.
#     The `semantic` extra pulls torch + the CUDA stack (~2 GB) which would
#     balloon every runner; it is opt-in and tested via mocks (the wrapper
#     imports `sentence_transformers` lazily and mypy ignores its types),
#     so CI never needs it installed. `packaging` (pyinstaller) is dropped
#     too — it is only used to build release binaries. When a NEW
#     non-semantic extra is added, remember to extend this list.
#     `typecheck` also caches `.mypy_cache/` so incremental runs only
#     re-check files whose hash actually changed.
#
# Path-filter gating: the four expensive jobs short-circuit when the diff
# doesn't touch their domain. Each gated job:
#   1. Checks out the repo with `fetch-depth: 0` — dorny/paths-filter needs
#      git history on `push` events to diff against the previous commit
#      (for `pull_request` it uses the GH API and the checkout isn't needed,
#      but we keep one checkout step that satisfies both event types). The
#      first attempt (PR #395) skipped this and broke `push` builds on main
#      with `git exit 128`.
#   2. Runs dorny/paths-filter to compute whether the diff touched any
#      relevant path. Workflow-level `paths:` cannot replace this because a
#      required status check that never runs leaves branch protection stuck
#      in "expected" forever.
#   3. Echoes a skip note + guards every following step on the filter
#      output. `lint` and `pip-audit` stay always-on — `lint` is ~10 s
#      anywhere and `pip-audit` is the per-PR CVE gate that must still
#      catch a fresh upstream advisory even on a docs-only PR.

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # `dorny/paths-filter` needs git history to diff against the
          # previous commit on `push`. `fetch-depth: 0` makes that work
          # without dragging the submodule (handled separately below).
          fetch-depth: 0
          # actions/checkout does not honour `shallow = true` in .gitmodules
          # natively, so we skip it here and clone the submodule manually
          # below. legalize-es is ~1.7 GB upstream; `--depth 1` only trims
          # history (the tip still pulls hundreds of MB), so we combine it
          # with `--filter=blob:none` and `actions/cache` keyed to the
          # gitlink SHA to make cache hits near-instant.
          submodules: false

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          # Backend / test surface. Includes the submodule pointer
          # (`data/`) and the workflow itself so an edit to the gating
          # logic still re-runs the suite.
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'data/**'
              - '.github/workflows/ci.yml'

      - name: Skip — no backend changes
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend source changes; skipping pytest."

      - name: Resolve legalize-es gitlink SHA
        if: steps.changes.outputs.backend == 'true'
        id: legalize-sha
        run: echo "sha=$(git ls-tree HEAD data/legalize-es | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Cache legalize-es submodule checkout
        if: steps.changes.outputs.backend == 'true'
        id: legalize-cache
        uses: actions/cache@v5
        with:
          path: data/legalize-es
          key: legalize-es-${{ runner.os }}-${{ steps.legalize-sha.outputs.sha }}

      - name: Shallow + partial clone of legalize-es (cache miss only)
        if: steps.changes.outputs.backend == 'true' && steps.legalize-cache.outputs.cache-hit != 'true'
        run: |
          git -c submodule.recurse=false \
              -c protocol.version=2 \
              submodule update --init --depth 1 --filter=blob:none data/legalize-es

      - name: Install uv
        if: steps.changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install dependencies
        if: steps.changes.outputs.backend == 'true'
        run: uv sync --extra chat --extra dashboards --extra dev --frozen

      # Parallel pytest with xdist. ``-n auto`` spawns one worker per
      # logical core (2 on GitHub-hosted ubuntu-latest). ``--dist=loadfile``
      # keeps every test in a given file on the same worker so module-
      # level fixtures (singleton settings cache, audit-log singleton,
      # ``LEXFLOW_CONFIG_DIR`` env overrides) stay isolated within files
      # instead of racing across workers. ``-q`` because the per-worker
      # interleaved output of ``-v`` is unreadable in CI logs.
      - name: Run tests
        if: steps.changes.outputs.backend == 'true'
        run: uv run pytest -q -n auto --dist=loadfile

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Ruff check
        run: uvx ruff check .

      - name: Ruff format check
        run: uvx ruff format --check .

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'

      - name: Skip — no backend changes
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend source changes; skipping mypy."

      - name: Install uv
        if: steps.changes.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      # Mypy needs every imported third-party package on the path to resolve
      # types. src/lexflow/chat imports `openai`/`anthropic`/`google.genai`
      # (chat extra) and src/lexflow/dashboards uses plotly (dashboards
      # extra). The `semantic` extra is excluded on purpose — torch is too
      # heavy and the wrapper's `sentence_transformers` import is covered by
      # an `ignore_missing_imports` mypy override.
      - name: Install dependencies
        if: steps.changes.outputs.backend == 'true'
        run: uv sync --extra chat --extra dashboards --extra dev --frozen

      # Mypy is incremental: re-runs only re-analyse files whose source
      # has changed since the last successful run. The key includes both
      # pyproject.toml (mypy config) and every file under src/lexflow/ so
      # the cache invalidates whenever the analysed surface actually moves.
      - name: Cache mypy
        if: steps.changes.outputs.backend == 'true'
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'src/lexflow/**') }}
          restore-keys: |
            mypy-${{ runner.os }}-

      - name: Mypy
        if: steps.changes.outputs.backend == 'true'
        run: uv run mypy src/lexflow/

  # Builds the React SPA on every push and PR. Required for merging to main
  # (see scripts/setup-github.sh for the branch-protection contexts).
  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

      - name: Skip — no frontend changes
        if: steps.changes.outputs.frontend != 'true'
        run: echo "No frontend changes; skipping SPA lint+test+build."

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.frontend == 'true'
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: npm ci

      - name: Lint
        if: steps.changes.outputs.frontend == 'true'
        run: npm run lint

      # #90 — Vitest unit tests for the SPA. Runs in jsdom; setup file
      # wires up @testing-library/jest-dom matchers. Kept inside
      # `frontend-build` so a single job covers the SPA's full pre-merge
      # contract (lint + tests + production build).
      - name: Unit tests
        if: steps.changes.outputs.frontend == 'true'
        run: npm run test

      - name: Build
        if: steps.changes.outputs.frontend == 'true'
        run: npm run build

  # Builds the standalone marketing landing under landing/. Completely
  # independent from the SPA above — different deps, different bundle. Runs
  # informationally so a broken marketing build never blocks app merges.
  landing-build:
    name: landing-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            landing:
              - 'landing/**'
              - '.github/workflows/ci.yml'

      - name: Skip — no landing changes
        if: steps.changes.outputs.landing != 'true'
        run: echo "No landing changes; skipping landing build."

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.landing == 'true'
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.landing == 'true'
        run: npm ci

      # The build prerenders the landing with headless Chromium (#689); the
      # browser binary must be present for `npm run build` to succeed.
      - name: Install Chromium (prerender)
        if: steps.changes.outputs.landing == 'true'
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        if: steps.changes.outputs.landing == 'true'
        run: npm run typecheck

      - name: Build
        if: steps.changes.outputs.landing == 'true'
        run: npm run build

  # #252 — same-day CVE alerts on Python dependencies via OSV/PyPA.
  # Independent job (not embedded in `test`) so a transient advisory
  # never poisons the test signal. Fails the job (and the PR) on any
  # known vulnerability so we ship clean. Complements Dependabot's
  # weekly cadence with a per-PR gate.
  #
  # NOT gated by path-filter: an upstream advisory can surface a new
  # CVE on a dependency we already lock, even when the diff doesn't
  # touch `uv.lock`. Catching that early matters more than the ~15 s
  # cost.
  #
  # Baseline established 2026-05-31: the initial pip-audit run on this
  # PR caught 7 real CVEs across 5 transitives (authlib, idna,
  # python-multipart, starlette, urllib3); `uv lock --upgrade-package`
  # for each cleared them before this job became required.
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Sync locked dependencies
        run: uv sync --extra chat --extra dashboards --extra dev --frozen

      - name: Audit installed dependency graph
        # --skip-editable: don't audit the editable local `lexflow` package
        # (it isn't on PyPI, so pip-audit errored "Dependency not found").
        # Third-party deps are still fully audited.
        run: uv run --with pip-audit pip-audit --skip-editable
