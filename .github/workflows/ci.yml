name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "docs/**"]
  pull_request:
    branches: [main]

# Cancel any in-flight CI for the same ref when a newer push lands. Keeps
# the queue from piling up when release-please pushes back-to-back PR
# refreshes (which previously stranded multiple runs in "queued").
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Notes on dependency strategy across the three jobs:
#   - All three jobs enable uv's built-in cache (`enable-cache: true`) and
#     key it off `uv.lock`. The cache only invalidates when the resolved
#     graph actually changes — cosmetic edits to pyproject.toml (re-ordering,
#     tool config, comments) reuse the wheel store.
#   - All sync calls use `--frozen` to skip resolution entirely and just
#     install the locked versions. Faster than letting uv re-resolve on
#     every run, and guarantees CI sees exactly what the developer
#     committed.
#   - setup-uv installs Python via the `python-version` input.
#   - `lint` does NOT call `uv sync`. Ruff is the only tool it needs, so
#     `uvx ruff` runs it as an ephemeral tool.
#   - `typecheck` calls `uv sync --extra dev` (mypy lives in the dev extra).
#     It also caches `.mypy_cache/` so incremental runs only re-check files
#     whose hash actually changed.
#   - `test` keeps `uv sync --all-extras` because the suite may touch chat
#     and dashboards code paths that need every extra installed.

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # actions/checkout does not honour `shallow = true` in .gitmodules
          # natively, so we skip it here and clone the submodule manually
          # below. legalize-es is ~1.7 GB upstream; `--depth 1` only trims
          # history (the tip still pulls hundreds of MB), so we combine it
          # with `--filter=blob:none` and `actions/cache` keyed to the
          # gitlink SHA to make cache hits near-instant.
          submodules: false

      - name: Resolve legalize-es gitlink SHA
        id: legalize-sha
        run: echo "sha=$(git ls-tree HEAD data/legalize-es | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Cache legalize-es submodule checkout
        id: legalize-cache
        uses: actions/cache@v5
        with:
          path: data/legalize-es
          key: legalize-es-${{ runner.os }}-${{ steps.legalize-sha.outputs.sha }}

      - name: Shallow + partial clone of legalize-es (cache miss only)
        if: steps.legalize-cache.outputs.cache-hit != 'true'
        run: |
          git -c submodule.recurse=false \
              -c protocol.version=2 \
              submodule update --init --depth 1 --filter=blob:none data/legalize-es

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run tests
        run: uv run pytest -v

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Ruff check
        run: uvx ruff check .

      - name: Ruff format check
        run: uvx ruff format --check .

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      # Mypy needs every imported third-party package on the path to resolve
      # types. The src/lexflow/chat module imports `openai`/`anthropic`/`google.genai`
      # (chat extra) and src/lexflow/dashboards uses plotly (dashboards extra),
      # so we install --all-extras even though it is heavier than --extra dev.
      - name: Install dependencies
        run: uv sync --all-extras --frozen

      # Mypy is incremental: re-runs only re-analyse files whose source
      # has changed since the last successful run. The key includes both
      # pyproject.toml (mypy config) and every file under src/lexflow/ so
      # the cache invalidates whenever the analysed surface actually moves.
      - name: Cache mypy
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'src/lexflow/**') }}
          restore-keys: |
            mypy-${{ runner.os }}-

      - name: Mypy
        run: uv run mypy src/lexflow/

  # Builds the React SPA on every push and PR. Required for merging to main
  # (see scripts/setup-github.sh for the branch-protection contexts).
  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # #90 — Vitest unit tests for the SPA. Runs in jsdom; setup file
      # wires up @testing-library/jest-dom matchers. Kept inside
      # `frontend-build` so a single job covers the SPA's full pre-merge
      # contract (lint + tests + production build).
      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  # Builds the standalone marketing landing under landing/. Completely
  # independent from the SPA above — different deps, different bundle. Runs
  # informationally so a broken marketing build never blocks app merges.
  landing-build:
    name: landing-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # #252 — same-day CVE alerts on Python dependencies via OSV/PyPA.
  # Independent job (not embedded in `test`) so a transient advisory
  # never poisons the test signal. Fails the job (and the PR) on any
  # known vulnerability so we ship clean. Complements Dependabot's
  # weekly cadence with a per-PR gate.
  #
  # Baseline established 2026-05-31: the initial pip-audit run on this
  # PR caught 7 real CVEs across 5 transitives (authlib, idna,
  # python-multipart, starlette, urllib3); `uv lock --upgrade-package`
  # for each cleared them before this job became required.
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Sync locked dependencies
        run: uv sync --all-extras --frozen

      - name: Audit installed dependency graph
        run: uv run --with pip-audit pip-audit
