    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "url": "https://vforvitorio.github.io/LexFlow/",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Qué es LexFlow?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "LexFlow es una plataforma open source para explorar la legislación española. Indexa 12.000+ leyes del corpus legalize-es (BOE), las conecta en un grafo de conocimiento de referencias cruzadas, ofrece un chat con IA que cita el artículo exacto, y paneles de analítica. Se ejecuta localmente, sin cuenta ni nube."
            }
          },
          {
            "@type": "Question",
            "name": "¿LexFlow es gratis?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. LexFlow es 100% open source bajo licencia Apache 2.0. No hay suscripción, ni cuenta, ni coste de uso."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué modelos de IA admite LexFlow?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "LexFlow admite cinco proveedores LLM: Ollama (local y offline), OpenAI, Anthropic, Google y LM Studio. El chat cita el artículo real del BOE en cada respuesta."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo usar LexFlow sin conexión?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. LexFlow es local-first: toda la aplicación corre en tu equipo. El chat funciona offline conectando un modelo local de Ollama."
            }
          }
        ]
      }
