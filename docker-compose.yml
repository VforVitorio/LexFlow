version: "3.9"

services:
  lexflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: lexflow:latest
    container_name: lexflow
    ports:
      - "${LEXFLOW_PORT:-8000}:8000"
    volumes:
      - lexflow-data:/app/data/legalize-es
    environment:
      - LEXFLOW_HOST=0.0.0.0
      - LEXFLOW_PORT=8000
      - LEXFLOW_LOG_LEVEL=${LEXFLOW_LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  lexflow-data:
    driver: local
