version: "3.9"

services:
  lexflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: lexflow:latest
    container_name: lexflow
    ports:
      - "${LEXFLOW_PORT:-8000}:8000"
    volumes:
      # Read-only bind mount: the legalize-es corpus is baked into the image
      # at build time, but we expose the host checkout so contributors can
      # run a newer submodule without rebuilding. A previous named volume
      # (`lexflow-data:/app/data/legalize-es`) masked the corpus on first
      # boot and left the container with zero laws.
      - ./data/legalize-es:/app/data/legalize-es:ro
    environment:
      - LEXFLOW_HOST=0.0.0.0
      - LEXFLOW_PORT=8000
      - LEXFLOW_LOG_LEVEL=${LEXFLOW_LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
