<!doctype html>
<html lang="es" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3140c2" />
    <title>LexFlow · Legislación viva</title>

    <!-- #77 — Favicons + brand icons.
         SVG is the canonical source. PNG/ICO variants are generated from
         it by `frontend/scripts/gen-icons.mjs` and committed under
         /public so production deploys never re-render them. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#5d6cf6" />

    <!-- Open Graph + Twitter — controls how the link unfurls on
         WhatsApp / Slack / Telegram / Twitter / Discord. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LexFlow" />
    <meta property="og:title" content="LexFlow · Legislación viva" />
    <meta property="og:description" content="Explora, analiza y consulta la legislación española como un grafo navegable. Open source." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LexFlow · Legislación viva" />
    <meta name="twitter:description" content="Explora, analiza y consulta la legislación española como un grafo navegable. Open source." />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="description" content="Plataforma open source para explorar, analizar y consultar la legislación española como un grafo navegable." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="h-full bg-bg text-fg antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!--
      #162 — Cloudflare Web Analytics.
      Cookieless, RGPD-friendly, ~3KB. Reports page views + web vitals.
      Paste your token (Cloudflare Dashboard → Web Analytics → Add a site
      → "vforvitorio.github.io/LexFlow") into VITE_CF_BEACON_TOKEN at
      build time (.env / GitHub Actions secret). The deploy workflow
      substitutes the value into the placeholder below.
    -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "__VITE_CF_BEACON_TOKEN__"}'
    ></script>
  </body>
</html>
